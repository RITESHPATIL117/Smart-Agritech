# Build from repo root — in Amplify Console set "Monorepo app root" to EMPTY (not "client")
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd client && npm ci
    build:
      commands:
        - cd client && npm run build
  artifacts:
    baseDirectory: client/dist
    files:
      - '**/*'
  cache:
    paths:
      - client/node_modules/**/*
  customRedirects:
    - source: '/api/<*>'
      target: 'http://smart-agritech-env.eba-mjmv3nxz.us-east-1.elasticbeanstalk.com/api/<*>'
      status: '200'
    - source: '/uploads/<*>'
      target: 'http://smart-agritech-env.eba-mjmv3nxz.us-east-1.elasticbeanstalk.com/uploads/<*>'
      status: '200'
    - source: '/<*>'
      target: '/index.html'
      status: '404-200'
