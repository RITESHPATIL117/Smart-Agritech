# Frontend-only hosting on Amplify (app root = client)
# For live API during demo use localhost (see HOST_FRONTEND_AWS.md) — do not set http:// EB URL on HTTPS Amplify
version: 1
applications:
  - appRoot: client
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
      customRules:
        - source: '/<*>'
          target: '/index.html'
          status: '404-200'
